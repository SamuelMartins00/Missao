{% extends "base.html" %}

{% block content %}

<div class="max-w-lg mx-auto mt-10">

    <!-- Ícone de alerta -->
    <div class="flex justify-center mb-6">
        <div class="bg-red-100 rounded-full p-5">
            <svg class="w-10 h-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
            </svg>
        </div>
    </div>

    <!-- Título e descrição -->
    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Confirmar exclusão</h1>
        <p class="text-slate-500">Você está prestes a excluir o seguinte registro de <span class="font-medium text-slate-700">{{ titulo }}</span>. Essa ação não pode ser desfeita.</p>
    </div>

    <!-- Card com os dados do item -->
    <div class="bg-white border border-slate-200 rounded-2xl p-6 mb-8 shadow-sm">
        <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4">Dados do registro</h2>
        <dl class="flex flex-col gap-3">
            {% for rotulo, valor in campos %}
            <div class="flex flex-col sm:flex-row sm:gap-4">
                <dt class="text-sm font-medium text-slate-500 sm:w-24 shrink-0">{{ rotulo }}</dt>
                <dd class="text-sm text-slate-800 font-medium">{{ valor }}</dd>
            </div>
            {% endfor %}
        </dl>
    </div>

    <!-- Botões -->
    <div class="flex flex-col sm:flex-row gap-3">
        <a href="{{ rota_cancelar }}"
            class="flex-1 text-center bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold px-6 py-3 rounded-xl transition">
            Cancelar
        </a>
        <form action="{{ rota_confirmar }}" method="POST" class="flex-1">
            <button type="submit"
                class="w-full bg-red-500 hover:bg-red-600 active:bg-red-700 text-white font-semibold px-6 py-3 rounded-xl transition">
                Sim, excluir
            </button>
        </form>
    </div>

</div>

{% endblock %}
