<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Login — AD Missões CJ</title>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center font-['DM_Sans',sans-serif]">

    <div class="w-full max-w-sm px-6">

        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">
                <span class="text-orange-600">AD</span> Missões CJ
            </h1>
            <p class="text-slate-500 text-sm mt-1">Faça login para continuar</p>
        </div>

        <!-- Card de login -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">

            <!-- Mensagem de erro -->
            {% if erro %}
            <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-6">
                {{ erro }}
            </div>
            {% endif %}

            <form action="/login" method="POST" class="flex flex-col gap-5">

                <div class="flex flex-col gap-1">
                    <label for="usuario" class="text-sm font-medium text-slate-700">Usuário</label>
                    <input type="text" id="usuario" name="usuario" required autofocus
                        placeholder="Digite seu usuário"
                        class="border border-slate-200 rounded-lg px-4 py-2.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition">
                </div>

                <div class="flex flex-col gap-1">
                    <label for="senha" class="text-sm font-medium text-slate-700">Senha</label>
                    <input type="password" id="senha" name="senha" required
                        placeholder="Digite sua senha"
                        class="border border-slate-200 rounded-lg px-4 py-2.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition">
                </div>

                <button type="submit"
                    class="mt-2 bg-orange-500 hover:bg-orange-600 active:bg-orange-700 text-white font-semibold px-6 py-2.5 rounded-lg transition">
                    Entrar
                </button>

            </form>
        </div>

    </div>

</body>
</html>
