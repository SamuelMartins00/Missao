{% extends "base.html" %}

{% block content %}

<div class="mb-8">
    <h1 class="text-3xl font-bold text-slate-800">Pedidos de <span class="text-orange-500">Oração</span></h1>
    <p class="text-slate-500 mt-1 text-sm">Registre o pedido de oração</p>
</div>

<div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-10">
    <form action="/pedidos" method="POST" class="flex flex-col gap-5">

        <div class="flex flex-col gap-1">
            <label for="nome" class="text-sm font-medium text-slate-700">Nome:</label>
            <input type="text" id="nome" name="nome" required
                class="border border-slate-200 rounded-lg px-4 py-2.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition">
        </div>

        <div class="flex flex-col gap-1">
            <label for="motivo" class="text-sm font-medium text-slate-700">Pedido:</label>
            <input type="text" id="motivo" name="motivo"
                class="border border-slate-200 rounded-lg px-4 py-2.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition">
        </div>

        <div class="flex justify-end">
            <button type="submit"
                class="bg-orange-500 hover:bg-orange-600 active:bg-orange-800 text-white font-semibold px-6 py-2.5 rounded-lg transition">
                Enviar
            </button>
        </div>

    </form>
</div>

<div>
    <h2 class="text-lg font-semibold text-slate-700 mb-4">Pedidos de oração registrados</h2>

    <ul class="flex flex-col gap-3">
        {% for p in pedidos %}
        <li
            class="bg-white border border-slate-100 rounded-xl px-5 py-4 shadow-sm flex flex-col md:flex-row md:items-center md:justify-between gap-1">
            <div>
                <span class="font-semibold text-slate-800">{{p.nome_ped}}</span>
                <span class="text-slate-500 mx-1">-</span>
                <span class="text-slate-600">{{p.motivo_ped}}</span>
            </div>
            <span class="text-sm text-slate-600">{{p.data_ped}}</span>
        </li>
        {% endfor %}
    </ul>
</div>

{% endblock %}
