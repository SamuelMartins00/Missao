services:

  db:
    image: mysql:8.0
    container_name: igreja_db
    restart: always
    command: --event-scheduler=ON
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: "America/Sao_Paulo"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./script.sql:/docker-entrypoint-initdb.d/script.sql
      - /etc/localtime:/etc/localtime:ro 
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: samuelmartins0/missao-web:latest
    container_name: igreja_web
    restart: always
    ports:
     - "5000:5000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD} 
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USUARIO: ${ADMIN_USUARIO}
      ADMIN_SENHA: ${ADMIN_SENHA}
      USUARIO_COMUM_USUARIO: ${USUARIO_COMUM_USUARIO}
      USUARIO_COMUM_SENHA: ${USUARIO_COMUM_SENHA}
      TZ: "America/Sao_Paulo" 
    volumes:
      - /etc/localtime:/etc/localtime:ro  
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: